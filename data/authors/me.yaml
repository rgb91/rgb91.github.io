bio: |
  Sanjay is an AI researcher specializing in Multimodal Video Understanding, 
  Computer Vision, Deepfakes, and Agentic AI. He is working in the Augmented Human Lab 
  (AHLab) at the National University of Singapore (NUS) as a Research Fellow. 
  Previously he was working as a Machine Learning Engineer at TikTok, where he tackled 
  complex multimodal video understanding and content matching problems. 
  Sanjay holds a PhD from the Department of Computer Science at NUS, with focus on 
  analysis of Deepfakes.

